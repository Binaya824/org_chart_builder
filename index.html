<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Org Chart Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f8fafc;
      --surface:     #ffffff;
      --surface-2:   #f1f5f9;
      --border:      #e2e8f0;
      --border-soft: #f1f5f9;
      --text-1:      #0f172a;
      --text-2:      #64748b;
      --text-3:      #94a3b8;
      --line:        #cbd5e1;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-1);
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #ffffff 0%, #f0f4ff 100%);
      border-bottom: 1px solid var(--border);
      padding: 36px 40px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 80% at 50% -20%, rgba(99,102,241,.07), transparent);
      pointer-events: none;
    }
    .header-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(99,102,241,.08);
      border: 1px solid rgba(99,102,241,.2);
      border-radius: 999px;
      padding: 4px 14px;
      font-size: 0.7rem; font-weight: 600;
      color: #4f46e5; letter-spacing: 0.8px;
      text-transform: uppercase; margin-bottom: 18px;
    }
    .header-badge span { width:6px; height:6px; border-radius:50%; background:#6366f1; display:inline-block; }
    h1 { font-size: 2rem; font-weight: 800; color: var(--text-1); letter-spacing: -0.5px; line-height: 1.2; margin-bottom: 8px; }
    h1 em { font-style:normal; color:#4f46e5; }
    .subtitle { font-size: 0.875rem; color: var(--text-2); font-weight: 400; max-width: 480px; margin: 0 auto 24px; line-height: 1.6; }
    .header-meta { display: flex; justify-content: center; align-items: center; gap: 12px; font-size: 0.72rem; font-weight: 500; flex-wrap: wrap; }
    .header-meta-pill { display: flex; align-items: center; gap: 5px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 4px 10px; color: var(--text-2); box-shadow: 0 1px 3px rgba(0,0,0,.06); }

    /* ── Header compact ── */
    .header { flex-shrink: 0; padding: 20px 40px 18px; }

    /* ── Infinite canvas viewport ── */
    .viewport {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: grab;
      user-select: none;
      background-color: var(--bg);
      background-image: radial-gradient(var(--border) 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .viewport.panning { cursor: grabbing; }

    /* ── Inner canvas — transformed for pan/zoom ── */
    .canvas-inner {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* ── Chart content inside canvas ── */
    .canvas {
      padding: 60px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: max-content;
    }

    /* ── Zoom controls ── */
    .zoom-bar {
      position: fixed; bottom: 28px; left: 28px;
      display: flex; align-items: center; gap: 2px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 4px;
      box-shadow: 0 2px 12px rgba(0,0,0,.1);
      z-index: 400;
    }
    .zoom-bar button {
      width: 30px; height: 30px; border-radius: 7px;
      border: none; background: transparent;
      color: var(--text-2); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: inherit; font-weight: 600;
      transition: background .12s, color .12s;
    }
    .zoom-bar button:hover { background: var(--surface-2); color: var(--text-1); }
    .zoom-bar .zoom-pct {
      min-width: 46px; text-align: center;
      font-size: 0.72rem; font-weight: 600; color: var(--text-2);
    }

    /* ── Tree connectors ── */
    .stem { width: 1px; height: 22px; background: var(--line); flex-shrink: 0; }
    .sib-drop { width: 1px; height: 22px; background: var(--line); flex-shrink: 0; }
    .siblings {
      display: flex; align-items: flex-start; justify-content: center;
      gap: 16px; position: relative;
    }
    .siblings.single { gap: 0; }
    .sib-col { display: flex; flex-direction: column; align-items: center; position: relative; }

    /* ── Tree node wrapper ── */
    .tree-node { display: flex; flex-direction: column; align-items: center; }

    /* ── Card wrapper — hover zone for + button ── */
    .card-wrap { position: relative; display: inline-flex; flex-direction: column; align-items: center; }

    /* ── Role card ── */
    .role-card {
      position: relative;
      border-radius: 8px;
      border: 1px solid var(--border);
      border-left-width: 3px;
      background: var(--surface);
      padding: 10px 14px 10px 12px;
      text-align: center;
      transition: box-shadow .2s;
      white-space: nowrap;
      min-width: 130px;
      cursor: default;
      user-select: none;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .role-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.1); }

    /* Role badge — top, centered */
    .rc-badge {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 600;
      padding: 2px 9px;
      border-radius: 999px;
      letter-spacing: 0.3px;
      line-height: 1.6;
    }

    /* Person name — below badge */
    .rc-person {
      font-size: 0.83rem;
      font-weight: 700;
      color: var(--text-1);
      line-height: 1.3;
      margin-top: 6px;
    }

    /* Card action buttons shown on card-wrap hover */
    .card-btns-right { display: none; position: absolute; top: 5px; right: 5px; flex-direction: column; gap: 4px; z-index: 20; }
    .card-btns-left  { display: none; position: absolute; top: 5px; left: 5px;  flex-direction: column; gap: 4px; z-index: 20; }
    .card-wrap:hover .card-btns-right,
    .card-wrap:hover .card-btns-left { display: flex; }
    .card-btns-right button,
    .card-btns-left button {
      width: 20px; height: 20px; border-radius: 50%;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-2); font-size: 0.65rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, color .15s, border-color .15s;
      padding: 0; line-height: 1;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
    }
    .btn-edit:hover { background: #3b82f6 !important; color: #fff !important; border-color: #3b82f6 !important; }
    .btn-del:hover  { background: #ef4444 !important; color: #fff !important; border-color: #ef4444 !important; }
    .btn-sib:hover  { background: #10b981 !important; color: #fff !important; border-color: #10b981 !important; }

    /* Per-column category label — sits inside sib-col, above sib-drop */
    .sib-cat {
      font-size: 0.58rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--text-2);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 999px; padding: 2px 10px;
      white-space: nowrap; pointer-events: none;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
      margin-bottom: 4px;
    }
    /* 1px-wide pipe — same axis as stem/sib-drop — with label floating on it */
    .cat-label-line {
      width: 1px;
      min-height: 40px;
      background: var(--line);
      position: relative;
      flex-shrink: 0;
    }
    .cat-label-line .sib-cat {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
    }
    .sib-cat {
      background: var(--surface); /* paint over the 1px line behind the text */
    }
    /* Crossbar drawn by JS (drawCrossbars) so it spans exactly center-to-center */
    .crossbar-line {
      position: absolute;
      top: 0;
      height: 1px;
      background: var(--line);
      pointer-events: none;
    }

    /* ── Drag & drop ── */
    .role-card[draggable="true"] { cursor: grab; }
    .role-card.dragging { opacity: 0.35; cursor: grabbing; box-shadow: none !important; }
    .role-card.drag-over {
      outline: 2px dashed #6366f1 !important;
      outline-offset: 3px;
      background: rgba(99,102,241,.06) !important;
    }

    /* Add-child button — absolutely positioned so it doesn't break the connector line */
    .btn-add-child {
      position: absolute;
      bottom: -13px; left: 50%; transform: translateX(-50%);
      opacity: 0; pointer-events: none;
      width: 22px; height: 22px; border-radius: 50%;
      border: 1px dashed var(--border); background: var(--surface);
      color: var(--text-3); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .15s, border-color .15s, color .15s;
      z-index: 10;
    }
    .card-wrap:hover .btn-add-child { opacity: 1; pointer-events: auto; }
    .btn-add-child:hover { border-color: #6366f1; color: #6366f1; background: rgba(99,102,241,.07); }

    /* ── Color variants ── */
    .rc-system  { border-left-color: #6366f1; }
    .rc-system  .rc-badge { background: rgba(99,102,241,.1);  color: #4338ca; }
    .rc-system:hover { box-shadow: 0 4px 16px rgba(99,102,241,.15); }

    .rc-exec    { border-left-color: #f59e0b; }
    .rc-exec    .rc-badge { background: rgba(245,158,11,.12); color: #b45309; }
    .rc-exec:hover    { box-shadow: 0 4px 16px rgba(245,158,11,.15); }

    .rc-hr      { border-left-color: #10b981; }
    .rc-hr      .rc-badge { background: rgba(16,185,129,.12); color: #059669; }
    .rc-hr:hover      { box-shadow: 0 4px 16px rgba(16,185,129,.15); }

    .rc-finance { border-left-color: #0ea5e9; }
    .rc-finance .rc-badge { background: rgba(14,165,233,.12); color: #0284c7; }
    .rc-finance:hover { box-shadow: 0 4px 16px rgba(14,165,233,.15); }

    .rc-payroll { border-left-color: #8b5cf6; }
    .rc-payroll .rc-badge { background: rgba(139,92,246,.12); color: #7c3aed; }
    .rc-payroll:hover { box-shadow: 0 4px 16px rgba(139,92,246,.15); }

    .rc-visa    { border-left-color: #f97316; }
    .rc-visa    .rc-badge { background: rgba(249,115,22,.12); color: #ea580c; }
    .rc-visa:hover    { box-shadow: 0 4px 16px rgba(249,115,22,.15); }

    .rc-div     { border-left-color: #ec4899; }
    .rc-div     .rc-badge { background: rgba(236,72,153,.12); color: #db2777; }
    .rc-div:hover     { box-shadow: 0 4px 16px rgba(236,72,153,.15); }

    .rc-onboard { border-left-color: #14b8a6; }
    .rc-onboard .rc-badge { background: rgba(20,184,166,.12); color: #0f766e; }
    .rc-onboard:hover { box-shadow: 0 4px 16px rgba(20,184,166,.15); }

    .rc-people  { border-left-color: #64748b; }
    .rc-people  .rc-badge { background: rgba(100,116,139,.12); color: #475569; }
    .rc-people:hover  { box-shadow: 0 4px 16px rgba(100,116,139,.15); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.4);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 32px;
      width: 440px; max-width: 92vw;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.15);
    }
    .modal h3 { font-size: 1rem; font-weight: 700; margin-bottom: 22px; color: var(--text-1); }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.9px; color: var(--text-3); margin-bottom: 8px; }
    .form-group input[type="text"] {
      width: 100%; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-1); font-family: inherit;
      font-size: 0.875rem; padding: 10px 14px; outline: none;
      transition: border-color .15s;
    }
    .form-group input[type="text"]:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    .form-group input[type="text"].err { border-color: #ef4444; }

    .color-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .color-swatch {
      width: 30px; height: 30px; border-radius: 8px;
      cursor: pointer; border: 2px solid transparent;
      transition: transform .12s, border-color .12s;
      display: flex; align-items: center; justify-content: center;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.active { border-color: #1e293b; }

    .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
    .btn-cancel {
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-2); font-family: inherit;
      font-size: 0.8rem; font-weight: 500; padding: 9px 20px; cursor: pointer;
      transition: all .15s;
    }
    .btn-cancel:hover { border-color: var(--text-2); color: var(--text-1); }
    .btn-save {
      background: #4f46e5; border: 1px solid #4f46e5;
      border-radius: 8px; color: #fff; font-family: inherit;
      font-size: 0.8rem; font-weight: 600; padding: 9px 20px; cursor: pointer;
      transition: all .15s;
    }
    .btn-save:hover { background: #4338ca; border-color: #4338ca; }

    /* ── Hint bar ── */
    .hint { margin-top: 28px; font-size: 0.72rem; color: var(--text-3); text-align: center; }
    .hint kbd {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 6px; font-family: inherit;
      font-size: 0.68rem; color: var(--text-2);
      box-shadow: 0 1px 2px rgba(0,0,0,.06);
    }

    /* ── Footer ── */
    .footer { display: none; }

    /* ── Export button ── */
    .export-btn {
      position: fixed; bottom: 28px; right: 28px;
      display: flex; align-items: center; gap: 8px;
      background: #4f46e5; border: 1px solid #4f46e5;
      border-radius: 10px; color: #fff;
      font-family: inherit; font-size: 0.8rem; font-weight: 600;
      padding: 10px 18px; cursor: pointer; z-index: 500;
      box-shadow: 0 4px 16px rgba(79,70,229,.35);
      transition: background .15s, box-shadow .15s, transform .12s;
    }
    .export-btn:hover { background: #4338ca; box-shadow: 0 6px 24px rgba(79,70,229,.45); transform: translateY(-1px); }
    .export-btn:active { transform: translateY(0); }
    .export-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .export-btn svg { flex-shrink: 0; }

    /* ── Reference panel ── */
    .ref-toggle {
      position: fixed; top: 24px; right: 28px;
      display: flex; align-items: center; gap: 7px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-2);
      font-family: inherit; font-size: 0.78rem; font-weight: 600;
      padding: 8px 14px; cursor: pointer; z-index: 400;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      transition: all .15s;
    }
    .ref-toggle:hover { border-color: #6366f1; color: #4f46e5; box-shadow: 0 2px 8px rgba(99,102,241,.15); }
    .ref-toggle svg { flex-shrink: 0; }

    .ref-panel {
      position: fixed; top: 0; right: -420px;
      width: 400px; max-width: 92vw; height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      box-shadow: -8px 0 32px rgba(0,0,0,.1);
      display: flex; flex-direction: column;
      z-index: 600;
      transition: right .3s cubic-bezier(.4,0,.2,1);
    }
    .ref-panel.open { right: 0; }

    .ref-panel-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .ref-panel-head h4 {
      font-size: 0.85rem; font-weight: 700; color: var(--text-1);
      display: flex; align-items: center; gap: 8px;
    }
    .ref-panel-head h4 span {
      font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--text-3);
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 7px;
    }
    .ref-close {
      width: 28px; height: 28px; border-radius: 6px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text-3); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .ref-close:hover { background: var(--surface-2); color: var(--text-1); }

    .ref-body {
      flex: 1; overflow-y: auto;
      padding: 20px;
      font-size: 0.8rem; color: var(--text-1); line-height: 1.7;
    }
    .ref-body pre {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 0.75rem;
      line-height: 1.7;
      color: var(--text-1);
      white-space: pre;
    }
    .ref-body h1 {
      font-size: 0.9rem; font-weight: 700; margin-bottom: 16px;
      color: var(--text-1); border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    .ref-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(15,23,42,.2);
      z-index: 599;
    }
    .ref-backdrop.open { display: block; }

    @media (max-width: 800px) {
      h1 { font-size: 1.4rem; }
      .canvas { padding: 0 12px; }
      .ref-toggle { top: auto; bottom: 80px; }
    }
  </style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header class="header">
  <div class="header-badge"><span></span> Interactive Builder</div>
  <h1>Org <em>Chart</em> Builder</h1>
  <p class="subtitle">Hover any card to add people or edit. Build your real organization chart with names and roles.</p>
  <div class="header-meta">
    <div class="header-meta-pill" id="meta-count">1 person</div>
    <div class="header-meta-pill" id="meta-depth">1 level</div>
  </div>
</header>

<!-- ══ VIEWPORT ══ -->
<div class="viewport" id="viewport">
  <div class="canvas-inner" id="canvas-inner">
    <div class="canvas" id="chart"></div>
  </div>
</div>

<!-- ══ ZOOM CONTROLS ══ -->
<div class="zoom-bar">
  <button onclick="zoomStep(-0.15)" title="Zoom out">−</button>
  <span class="zoom-pct" id="zoom-pct">100%</span>
  <button onclick="zoomStep(0.15)" title="Zoom in">+</button>
  <button onclick="resetView()" title="Fit to screen" style="font-size:0.75rem;letter-spacing:-0.5px">FIT</button>
</div>

<!-- ══ MODAL ══ -->
<div class="modal-overlay" id="overlay" onclick="onOverlayClick(event)" style="display:none">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 id="modal-title">Add Person</h3>

    <div class="form-group">
      <label>Category / Group <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-3)">(optional)</span></label>
      <input type="text" id="inp-category" placeholder="e.g. Human Resources, Executive" />
    </div>

    <div class="form-group">
      <label>Role / Title</label>
      <input type="text" id="inp-role" placeholder="e.g. CEO, Manager, Developer" />
    </div>

    <div class="form-group">
      <label>Person Name <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--text-3)">(optional)</span></label>
      <input type="text" id="inp-name" placeholder="e.g. John Smith" />
    </div>

    <div class="form-group">
      <label>Color</label>
      <div class="color-grid" id="color-grid"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<!-- ══ REFERENCE TOGGLE ══ -->
<button class="ref-toggle" onclick="toggleRef()">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
  </svg>
  Hierarchy Reference
</button>

<!-- ══ REFERENCE PANEL ══ -->
<div class="ref-backdrop" id="ref-backdrop" onclick="toggleRef()"></div>
<aside class="ref-panel" id="ref-panel">
  <div class="ref-panel-head">
    <h4>
      Hierarchy Reference
      <span>roles.md</span>
    </h4>
    <button class="ref-close" onclick="toggleRef()">✕</button>
  </div>
  <div class="ref-body" id="ref-body">
    <p style="color:var(--text-3); font-size:0.75rem;">Loading…</p>
  </div>
</aside>

<!-- ══ EXPORT BUTTON ══ -->
<button class="export-btn" id="export-btn" onclick="exportImage()">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
  </svg>
  Export PNG
</button>

<!-- ══ FOOTER ══ -->
<footer class="footer">Org Chart Builder — click + to add, ✏ to edit</footer>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────

const STORAGE_KEY = 'orgchart_v1';
let saved = null;
try { saved = JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch {}
let root = saved?.root ?? { id: 1, role: 'CEO', name: '', category: '', color: 'exec', children: [] };
let uid  = saved?.uid  ?? 2;

// ── Palette ───────────────────────────────────────────────────────────────────

const PALETTE = [
  { key: 'exec',    hex: '#f59e0b' },
  { key: 'hr',      hex: '#10b981' },
  { key: 'finance', hex: '#0ea5e9' },
  { key: 'payroll', hex: '#8b5cf6' },
  { key: 'visa',    hex: '#f97316' },
  { key: 'div',     hex: '#ec4899' },
  { key: 'onboard', hex: '#14b8a6' },
  { key: 'people',  hex: '#64748b' },
  { key: 'system',  hex: '#6366f1' },
];

// ── Modal state ───────────────────────────────────────────────────────────────

let mMode = null;       // 'add' | 'edit'
let mParentId = null;
let mNodeId = null;
let mColor = 'exec';

// ── Tree helpers ──────────────────────────────────────────────────────────────

function find(node, id) {
  if (node.id === id) return node;
  for (const c of node.children) { const r = find(c, id); if (r) return r; }
  return null;
}

function findParent(node, id) {
  for (const c of node.children) {
    if (c.id === id) return node;
    const r = findParent(c, id); if (r) return r;
  }
  return null;
}

function countAll(node) { return 1 + node.children.reduce((s, c) => s + countAll(c), 0); }
function depth(node) { return node.children.length ? 1 + Math.max(...node.children.map(depth)) : 1; }

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}


// ── Render ────────────────────────────────────────────────────────────────────

function renderNode(n) {
  const col  = esc(n.color || 'exec');
  const role = esc(n.role  || '');
  const name = esc(n.name  || '');
  const isRoot = n.id === 1;
  const hasKids = n.children.length > 0;

  // Right-side buttons: edit + delete
  let btnRight = `<div class="card-btns-right">`;
  btnRight += `<button class="btn-edit" onclick="openEdit(${n.id})" title="Edit">✏</button>`;
  if (!isRoot) btnRight += `<button class="btn-del" onclick="delNode(${n.id})" title="Delete">×</button>`;
  btnRight += `</div>`;

  // Left-side button: add sibling (only for non-root)
  let btnLeft = '';
  if (!isRoot) {
    btnLeft = `<div class="card-btns-left">`;
    btnLeft += `<button class="btn-sib" onclick="openAddSibling(${n.id})" title="Add same-level">⊕</button>`;
    btnLeft += `</div>`;
  }

  // The card — draggable for non-root nodes
  const dragAttrs = isRoot ? '' : `draggable="true" ondragstart="onDragStart(event,${n.id})"`;
  let card = `<div class="role-card rc-${col}" ${dragAttrs} ondragover="onDragOver(event,${n.id})" ondragleave="onDragLeave(event)" ondrop="onDrop(event,${n.id})">`;
  card += `<span class="rc-badge">${role}</span>`;
  if (name) card += `<div class="rc-person">${name}</div>`;
  card += btnRight + btnLeft;
  card += `</div>`;

  // Card wrapper — hover zone for the + button
  let wrap = `<div class="card-wrap">`;
  wrap += card;
  wrap += `<button class="btn-add-child" onclick="openAdd(${n.id})" title="Add child">+</button>`;
  wrap += `</div>`;

  // Children — group same-category siblings under one label
  let kids = '';
  if (hasKids) {
    // Build groups: same category → one group; no category → individual entry each
    const groups = [];
    const catMap = Object.create(null);
    for (const c of n.children) {
      const cat = c.category || '';
      if (cat === '') {
        groups.push({ cat: '', nodes: [c] });
      } else {
        if (!catMap[cat]) {
          const g = { cat, nodes: [] };
          catMap[cat] = g;
          groups.push(g);
        }
        catMap[cat].nodes.push(c);
      }
    }

    const mainSingle = groups.length === 1 ? ' single' : '';
    kids += `<div class="stem"></div>`;
    kids += `<div class="siblings${mainSingle}">`;

    for (const g of groups) {
      kids += `<div class="sib-col">`;
      if (g.cat) {
        kids += `<div class="cat-label-line"><div class="sib-cat">${esc(g.cat)}</div></div>`;
      }
      if (g.nodes.length === 1) {
        // Single node in group — solid drop straight to card
        kids += `<div class="sib-drop"></div>${renderNode(g.nodes[0])}`;
      } else {
        // Multiple nodes in group — inner crossbar
        const innerSingle = g.nodes.length === 1 ? ' single' : '';
        kids += `<div class="stem"></div>`;
        kids += `<div class="siblings${innerSingle}">`;
        for (const c of g.nodes) {
          kids += `<div class="sib-col"><div class="sib-drop"></div>${renderNode(c)}</div>`;
        }
        kids += `</div>`;
      }
      kids += `</div>`;
    }
    kids += `</div>`;
  }

  return `<div class="tree-node">${wrap}${kids}</div>`;
}

function drawCrossbars() {
  requestAnimationFrame(() => {
    // scale may not be defined yet on first render (pan/zoom script runs after)
    const s = (typeof scale !== 'undefined' ? scale : 1);
    document.querySelectorAll('.siblings:not(.single)').forEach(sib => {
      const cols = [...sib.children].filter(c => c.classList.contains('sib-col'));
      if (cols.length < 2) return;
      const sRect = sib.getBoundingClientRect();
      const fRect = cols[0].getBoundingClientRect();
      const lRect = cols[cols.length - 1].getBoundingClientRect();
      // getBoundingClientRect values are in viewport pixels (after CSS transform).
      // Divide by scale to get layout pixels for CSS positioning inside .siblings.
      const left  = (fRect.left  + fRect.width  / 2 - sRect.left) / s;
      const right = (sRect.right - (lRect.left  + lRect.width / 2)) / s;
      let cb = sib.querySelector(':scope > .crossbar-line');
      if (!cb) { cb = document.createElement('div'); cb.className = 'crossbar-line'; sib.appendChild(cb); }
      cb.style.left  = left  + 'px';
      cb.style.right = right + 'px';
    });
  });
}

function render() {
  document.getElementById('chart').innerHTML = renderNode(root);
  const c = countAll(root), d = depth(root);
  document.getElementById('meta-count').textContent = `${c} ${c === 1 ? 'person' : 'people'}`;
  document.getElementById('meta-depth').textContent = `${d} ${d === 1 ? 'level' : 'levels'}`;
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ root, uid })); } catch {}
  drawCrossbars();
}

// ── Modal helpers ─────────────────────────────────────────────────────────────

function buildColorGrid() {
  document.getElementById('color-grid').innerHTML = PALETTE.map(p =>
    `<div class="color-swatch ${mColor === p.key ? 'active' : ''}"
         style="background:${p.hex}22; border-color:${mColor === p.key ? p.hex : 'transparent'}"
         title="${p.key}"
         onclick="pickColor('${p.key}','${p.hex}',this)">
       <span style="width:14px;height:14px;border-radius:3px;background:${p.hex};display:block;margin:auto"></span>
     </div>`
  ).join('');
}

function pickColor(key, hex, el) {
  mColor = key;
  document.querySelectorAll('.color-swatch').forEach(s => { s.classList.remove('active'); s.style.borderColor = 'transparent'; });
  el.classList.add('active');
  el.style.borderColor = hex;
}

function openModal(title) {
  document.getElementById('modal-title').textContent = title;
  buildColorGrid();
  document.getElementById('overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('inp-role').focus(), 40);
}

function openAdd(parentId) {
  mMode = 'add'; mParentId = parentId; mNodeId = null;
  mColor = 'exec';
  document.getElementById('inp-category').value = '';
  document.getElementById('inp-role').value = '';
  document.getElementById('inp-name').value = '';
  openModal('Add Person');
}

function openAddSibling(nodeId) {
  const parent = findParent(root, nodeId);
  if (!parent) return;
  const sibling = find(root, nodeId);
  openAdd(parent.id);
  // Inherit the same category as the sibling so the whole level stays consistent
  if (sibling && sibling.category) {
    document.getElementById('inp-category').value = sibling.category;
  }
}

function openEdit(nodeId) {
  const n = find(root, nodeId); if (!n) return;
  mMode = 'edit'; mNodeId = nodeId; mParentId = null;
  mColor = n.color || 'exec';
  document.getElementById('inp-category').value = n.category || '';
  document.getElementById('inp-role').value = n.role || '';
  document.getElementById('inp-name').value = n.name || '';
  openModal('Edit Person');
}

function closeModal() { document.getElementById('overlay').style.display = 'none'; }
function onOverlayClick(e) { if (e.target.id === 'overlay') closeModal(); }

function saveModal() {
  const roleEl = document.getElementById('inp-role');
  const role = roleEl.value.trim();
  if (!role) {
    roleEl.classList.add('err');
    roleEl.focus();
    setTimeout(() => roleEl.classList.remove('err'), 1400);
    return;
  }
  const name     = document.getElementById('inp-name').value.trim();
  const category = document.getElementById('inp-category').value.trim();

  if (mMode === 'add') {
    const parent = find(root, mParentId); if (!parent) return;
    parent.children.push({ id: uid++, role, name, category, color: mColor, children: [] });
  } else {
    const n = find(root, mNodeId); if (!n) return;
    Object.assign(n, { role, name, category, color: mColor });
  }

  closeModal();
  render();
}

function delNode(id) {
  if (!confirm('Delete this node and all its children?')) return;
  const parent = findParent(root, id); if (!parent) return;
  parent.children = parent.children.filter(c => c.id !== id);
  render();
}

// ── Drag & Drop ───────────────────────────────────────────────────────────────

let dragId = null;

function isAncestorOf(node, targetId) {
  // Returns true if targetId is node itself or a descendant
  if (node.id === targetId) return true;
  return node.children.some(c => isAncestorOf(c, targetId));
}

function onDragStart(e, id) {
  dragId = id;
  e.dataTransfer.effectAllowed = 'move';
  e.stopPropagation();
  // Mark card as dragging after a tick so it doesn't affect the drag image
  setTimeout(() => { const el = e.target; if (el) el.classList.add('dragging'); }, 0);
}

function onDragOver(e, targetId) {
  if (!dragId || dragId === targetId) return;
  const dragNode = find(root, dragId);
  if (!dragNode) return;
  // Disallow dropping onto own descendants
  if (isAncestorOf(dragNode, targetId)) return;
  e.preventDefault();
  e.stopPropagation();
  e.dataTransfer.dropEffect = 'move';
  e.currentTarget.classList.add('drag-over');
}

function onDragLeave(e) {
  e.currentTarget.classList.remove('drag-over');
}

function onDrop(e, targetId) {
  e.preventDefault();
  e.stopPropagation();
  e.currentTarget.classList.remove('drag-over');
  if (!dragId || dragId === targetId) { dragId = null; return; }

  const dragNode = find(root, dragId);
  const targetNode = find(root, targetId);
  if (!dragNode || !targetNode) { dragId = null; return; }
  if (isAncestorOf(dragNode, targetId)) { dragId = null; return; }

  // Remove from current parent
  const parent = findParent(root, dragId);
  if (!parent) { dragId = null; return; }
  parent.children = parent.children.filter(c => c.id !== dragId);

  // Attach as last child of target
  targetNode.children.push(dragNode);

  dragId = null;
  render();
}

// Clean up if dropped outside any valid target
document.addEventListener('dragend', () => {
  dragId = null;
  document.querySelectorAll('.dragging, .drag-over')
    .forEach(el => el.classList.remove('dragging', 'drag-over'));
});

// ── Keyboard shortcuts ────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.key === 'Enter' && document.getElementById('overlay').style.display === 'flex') {
    if (document.activeElement.tagName !== 'BUTTON') saveModal();
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────

render();
setTimeout(resetView, 60); // center after first paint
window.addEventListener('resize', drawCrossbars);
</script>

<script>
// ── Pan / Zoom ────────────────────────────────────────────────────────────────

const viewport   = document.getElementById('viewport');
const canvasInner = document.getElementById('canvas-inner');

let panX = 0, panY = 0, scale = 1;
let panning = false, startX = 0, startY = 0;

function applyTransform() {
  // Round to avoid sub-pixel rendering which causes blurriness
  const tx = Math.round(panX);
  const ty = Math.round(panY);
  canvasInner.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;
  viewport.style.backgroundPosition = `${tx % 24}px ${ty % 24}px`;
  document.getElementById('zoom-pct').textContent = Math.round(scale * 100) + '%';
  drawCrossbars();
}

function zoomStep(delta) {
  const cx = viewport.clientWidth  / 2;
  const cy = viewport.clientHeight / 2;
  const next = Math.min(2.5, Math.max(0.15, scale + delta));
  panX = cx - (cx - panX) * (next / scale);
  panY = cy - (cy - panY) * (next / scale);
  scale = next;
  applyTransform();
}

function resetView() {
  const vw = viewport.clientWidth;
  const vh = viewport.clientHeight;
  const cw = canvasInner.scrollWidth;
  const ch = canvasInner.scrollHeight;
  scale = Math.min(1, Math.min((vw - 80) / cw, (vh - 80) / ch));
  panX  = (vw - cw * scale) / 2;
  panY  = Math.max(40, (vh - ch * scale) / 2);
  applyTransform();
}

// ── Mouse pan ──
viewport.addEventListener('mousedown', e => {
  if (e.target.closest('button, input, .modal, .ref-panel, .role-card')) return;
  panning = true;
  startX  = e.clientX - panX;
  startY  = e.clientY - panY;
  viewport.classList.add('panning');
});
window.addEventListener('mousemove', e => {
  if (!panning) return;
  panX = e.clientX - startX;
  panY = e.clientY - startY;
  applyTransform();
});
window.addEventListener('mouseup', () => { panning = false; viewport.classList.remove('panning'); });

// ── Scroll to zoom ──
viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const rect  = viewport.getBoundingClientRect();
  const mx    = e.clientX - rect.left;
  const my    = e.clientY - rect.top;
  const delta = e.deltaY > 0 ? 0.92 : 1.08;
  const next  = Math.min(2.5, Math.max(0.15, scale * delta));
  panX = mx - (mx - panX) * (next / scale);
  panY = my - (my - panY) * (next / scale);
  scale = next;
  applyTransform();
}, { passive: false });

// ── Touch pan + pinch zoom ──
let lastDist = 0, lastTX = 0, lastTY = 0;
viewport.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    panning = true;
    startX = e.touches[0].clientX - panX;
    startY = e.touches[0].clientY - panY;
  } else if (e.touches.length === 2) {
    lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    lastTX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    lastTY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
  }
}, { passive: true });
viewport.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && panning) {
    panX = e.touches[0].clientX - startX;
    panY = e.touches[0].clientY - startY;
  } else if (e.touches.length === 2) {
    const dist  = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    const ratio = dist / lastDist;
    const mx    = (e.touches[0].clientX + e.touches[1].clientX) / 2;
    const my    = (e.touches[0].clientY + e.touches[1].clientY) / 2;
    const next  = Math.min(2.5, Math.max(0.15, scale * ratio));
    panX = mx - (mx - panX) * (next / scale);
    panY = my - (my - panY) * (next / scale);
    scale = next; lastDist = dist;
  }
  applyTransform();
}, { passive: false });
viewport.addEventListener('touchend', () => { panning = false; });
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
const SPIN_SVG = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin .8s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>`;
const DL_SVG   = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`;

async function exportImage() {
  const btn = document.getElementById('export-btn');
  btn.disabled = true;
  btn.innerHTML = SPIN_SVG + ' Generating…';

  // Hide UI chrome — buttons, zoom bar, ref toggle
  const hiddenEls = document.querySelectorAll(
    '.card-btns-right,.card-btns-left,.btn-add-child,.zoom-bar,.ref-toggle,.export-btn'
  );
  hiddenEls.forEach(el => el.style.visibility = 'hidden');

  // Reset the canvas transform so html2canvas sees the full natural layout
  // (not clipped/scaled by the infinite canvas pan+zoom transform)
  const savedTransform = canvasInner.style.transform;
  const savedOverflow  = viewport.style.overflow;
  canvasInner.style.transform = 'none';
  viewport.style.overflow     = 'visible';

  try {
    const chartEl = document.getElementById('chart');
    const nw = chartEl.scrollWidth;
    const nh = chartEl.scrollHeight;

    // Scale up to 2× for retina sharpness, but cap so the canvas
    // never exceeds 8192 px on either dimension (browser safety limit).
    const exportScale = Math.max(1, Math.min(2, 8000 / Math.max(nw, nh)));

    const offscreen = await html2canvas(chartEl, {
      backgroundColor: '#f8fafc',
      scale: exportScale,
      useCORS: true,
      scrollX: 0,
      scrollY: 0,
      x: 0,
      y: 0,
      width:  nw,
      height: nh,
      windowWidth:  nw,
      windowHeight: nh,
      logging: false,
    });

    // Trigger PNG download
    const link = document.createElement('a');
    link.download = 'org-chart.png';
    link.href = offscreen.toDataURL('image/png');
    link.click();
  } catch (err) {
    alert('Export failed: ' + err.message);
  } finally {
    // Restore transform and re-apply so crossbars are redrawn correctly
    canvasInner.style.transform = savedTransform;
    viewport.style.overflow     = savedOverflow;
    hiddenEls.forEach(el => el.style.visibility = '');
    btn.disabled = false;
    btn.innerHTML = DL_SVG + ' Export PNG';
    drawCrossbars();
  }
}
</script>

<script>
// ── Reference panel ───────────────────────────────────────────────────────────

let refLoaded = false;

function toggleRef() {
  const panel    = document.getElementById('ref-panel');
  const backdrop = document.getElementById('ref-backdrop');
  const isOpen   = panel.classList.contains('open');

  if (isOpen) {
    panel.classList.remove('open');
    backdrop.classList.remove('open');
  } else {
    panel.classList.add('open');
    backdrop.classList.add('open');
    if (!refLoaded) loadRef();
  }
}

async function loadRef() {
  const body = document.getElementById('ref-body');
  try {
    const res  = await fetch('roles.md');
    if (!res.ok) throw new Error('File not found');
    const text = await res.text();
    body.innerHTML = renderMd(text);
    refLoaded = true;
  } catch {
    body.innerHTML = `<p style="color:#ef4444;font-size:0.78rem;">Could not load <code>roles.md</code>. Make sure it is in the same folder.</p>`;
  }
}

function renderMd(md) {
  // Render heading and fenced code blocks; escape everything else
  const lines = md.split('\n');
  let html = '';
  let inCode = false;
  let codeBuf = '';

  for (const line of lines) {
    if (line.startsWith('```')) {
      if (!inCode) { inCode = true; codeBuf = ''; }
      else {
        html += `<pre>${escHtml(codeBuf)}</pre>`;
        inCode = false; codeBuf = '';
      }
      continue;
    }
    if (inCode) { codeBuf += line + '\n'; continue; }
    if (line.startsWith('# '))  { html += `<h1>${escHtml(line.slice(2))}</h1>`; continue; }
    if (line.startsWith('## ')) { html += `<h2 style="font-size:.8rem;font-weight:700;margin:16px 0 8px;color:var(--text-1)">${escHtml(line.slice(3))}</h2>`; continue; }
    if (line.trim() === '')     { html += '<br>'; continue; }
    html += `<p style="margin:0">${escHtml(line)}</p>`;
  }
  return html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
